  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const burger = document.querySelector('.navbar3_menu-button');
      const closeX = document.querySelector('.image-14');

      // 1. Logic to make custom 'X' close the menu
      if (closeX && burger) {
        closeX.addEventListener('click', function(e) {
          e.preventDefault();
          if (burger.classList.contains('w--open')) {
            burger.click();
          }
        });
      }

      // 2. Logic to keep overlay transparent
      const makeOverlayTransparent = () => {
        const overlay = document.querySelector('.w-nav-overlay');
        if (overlay) {
          overlay.style.backgroundColor = 'transparent';
          overlay.style.background = 'transparent';
        }
      };

      if (burger) {
        const observer = new MutationObserver(makeOverlayTransparent);
        observer.observe(burger, { attributes: true });
      }
      makeOverlayTransparent();
    });
  </script>
