  <script>
  document.addEventListener("DOMContentLoaded", function() {
    const burger = document.querySelector('.navbar3_menu-button');
    const closeX = document.querySelector('.image-14');
    
    // Close button functionality
    if (closeX && burger) {
      closeX.addEventListener('click', function() {
        if (burger.classList.contains('w--open')) burger.click();
      });
    }

    // Clean up Webflow's default grey overlay
    const cleanOverlay = () => {
      document.querySelectorAll('.w-nav-overlay').forEach(el => el.style.background = 'transparent');
    };
    cleanOverlay();
    if (burger) new MutationObserver(cleanOverlay).observe(burger, { attributes: true });
  });
  </script>
