  <script>
  document.addEventListener("DOMContentLoaded", function() {
    const burger = document.querySelector('.navbar3_menu-button');
    const closeX = document.querySelector('.image-14');

    // Handle the 'X' button inside the menu without duplicating layout structures
    if (closeX && burger) {
      closeX.addEventListener('click', function(e) {
        e.preventDefault();
        // Only click the burger to close if the Webflow nav menu is actually open
        if (burger.classList.contains('w--open')) {
          burger.click();
        }
      });
    }

    // Monitor the menu to ensure the transparent background layout remains correctly styled
    const navObserver = new MutationObserver(() => {
      const overlay = document.querySelector('.w-nav-overlay');
      if (overlay) {
        overlay.style.backgroundColor = 'transparent';
        overlay.style.background = 'transparent';
      }
    });

    if (burger) {
      navObserver.observe(burger, { attributes: true });
    }
  });
  </script>

  <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function() {
      const zoomButton = document.getElementById("button-zoom");
      
      if (zoomButton) {
        zoomButton.addEventListener("click", function() {
          document.body.classList.toggle("is-zoomed-out");
          
          if (document.body.classList.contains("is-zoomed-out")) {
            zoomButton.setAttribute("src", "images/zoomin.svg");
          } else {
            zoomButton.setAttribute("src", "images/zoomout2.svg");
          }
        });
      }
    });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const revealWrappers = document.querySelectorAll('.reveal-wrapper');
      
      revealWrappers.forEach(wrapper => {
        wrapper.addEventListener('click', function() {
          // This safely adds the 'active' class on click, and removes it on the next click
          this.classList.toggle('active');
        });
      });
    });
  </script>
