<script>
document.addEventListener("DOMContentLoaded", function() {
  const burger = document.querySelector('.navbar3_menu-button');
  const closeX = document.querySelector('.image-14');

  // Handle the 'X' button inside the menu
  if (closeX && burger) {
    closeX.addEventListener('click', function(e) {
      e.preventDefault();
      // Only click the burger if the menu is actually open
      if (burger.classList.contains('w--open')) {
        burger.click();
      }
    });
  }

  // Monitor the menu to ensure the transparent grey fix remains applied
  const navObserver = new MutationObserver(() => {
    const overlay = document.querySelector('.w-nav-overlay');
    if (overlay) {
      overlay.style.backgroundColor = 'transparent';
      overlay.style.background = 'transparent';
    }
  });

  if (burger) {
    navObserver.observe(burger, { attributes: true });
  }
});
</script>

  <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function() {
      const zoomButton = document.getElementById("button-zoom");
      
      if (zoomButton) {
        zoomButton.addEventListener("click", function() {
          document.body.classList.toggle("is-zoomed-out");
          
          if (document.body.classList.contains("is-zoomed-out")) {
            zoomButton.setAttribute("src", "images/zoomin.svg");
          } else {
            zoomButton.setAttribute("src", "images/zoomout2.svg");
          }
        });
      }
    });
  </script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
      // Sweeps through all matching portfolio elements on the page
      const portfolioCards = document.querySelectorAll('.portfolio-card-entry');
      
      portfolioCards.forEach(card => {
        card.addEventListener('click', function() {
          // Finds the local cover image specifically inside the clicked card
          const topImage = this.querySelector('.img-cover-layer');
          if (topImage) {
            if (topImage.style.opacity === '0') {
              topImage.style.opacity = '1';
            } else {
              topImage.style.opacity = '0';
            }
          }
        });
      });
    });
  </script>
